<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #2006a4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      border: 0px solid #e5e5e5;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      padding: 1.25rem 1.5rem;
      border: 5px solid black;
      border-radius: 10px 10px 0px 0px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 { font-size: 16px; font-weight: 500; }

    .badge {
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 99px;
      background: #dcfce7;
      color: #166534;
    }

    .auth-section { padding: 1.5rem; 
      display: flex; 
      flex-direction: column; 
      gap: 10px;
      border: 5px solid black;
      border-top: 0px;
      border-radius: 0px 0px 10px 10px;
    }

    #app-view {
      border: 5px solid black;
      border-top: 0px;
      border-radius: 0px 0px 10px 10px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 12px;
      border: 3px solid silver;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    input:focus { border-color: darkblue; }

    .btn {
      padding: 8px 16px;
      border: 1px solid black;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #18181b; color: white; border-color: #18181b; }
    .btn-primary:hover { background: #3f3f46; }
    .btn-danger { color: #dc2626; border-color: #fca5a5; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-row { display: flex; gap: 8px; }

    .add-row {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid silver;
      display: flex;
      gap: 8px;
    }

    .add-row input { flex: 1; }

    .task-list { padding: 0.75rem 1.5rem; display: flex; flex-direction: column; gap: 6px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid teal;
    }

    .task-circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid #d4d4d4;
      flex-shrink: 0;
    }

    .task-circle.done { border-color: #86efac; background: #dcfce7; }

    .task-title { font-size: 14px; flex: 1;}
    .task-title.done { text-decoration: line-through; color: #a3a3a3; }

    .footer {
      padding: 0.75rem 1.5rem;
      border-top: 1px solid #e5e5e5;
      font-size: 12px;
      color: black;
    }

    .error { font-size: 13px; color: #dc2626; text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <h1>Task manager</h1>
    <span class="badge hidden" id="user-badge"></span>
  </div>

  <div id="auth-view">
    <div class="auth-section">
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <div class="btn-row">
        <button class="btn btn-primary" style="flex:1" onclick="login()">Log in</button>
        <button class="btn" style="flex:1" onclick="register()">Register</button>
      </div>
      <p class="error hidden" id="auth-error"></p>
    </div>
  </div>

  <div id="app-view" class="hidden">
    <div class="add-row">
      <input type="text" id="new-task" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addTask()" />
      <button class="btn btn-primary" onclick="addTask()">Add</button>
    </div>
    <div class="task-list" id="task-list"></div>
    <div class="footer" id="footer"></div>
  </div>

</div>

<script>
  const API = "https://web-production-f948e.up.railway.app";
  let token = "";

  async function register() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const res = await fetch(`${API}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) return showAuthError(data.detail || "Registration failed");
    else return showAuthError(data.detail || "Registration complete");
    token = data.access_token;
    showApp(username);
  }

  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const form = new URLSearchParams();
    form.append("username", username);
    form.append("password", password);
    const res = await fetch(`${API}/login`, { method: "POST", body: form });
    const data = await res.json();
    if (!res.ok) return showAuthError(data.detail || "Login failed");
    token = data.access_token;
    showApp(username);
  }

  function showApp(username) {
    document.getElementById("auth-view").classList.add("hidden");
    document.getElementById("app-view").classList.remove("hidden");
    document.getElementById("user-badge").textContent = `logged in as ${username}`;
    document.getElementById("user-badge").classList.remove("hidden");
    loadTasks();
  }

  function showAuthError(msg) {
    const el = document.getElementById("auth-error");
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  async function loadTasks() {
    const res = await fetch(`${API}/tasks`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const tasks = await res.json();
    renderTasks(tasks);
  }

  function renderTasks(tasks) {
    const list = document.getElementById("task-list");
    const footer = document.getElementById("footer");
    list.innerHTML = "";

    tasks.forEach(task => {
      const item = document.createElement("div");
      item.className = "task-item";
      item.innerHTML = `
        <div class="task-circle ${task.completed ? 'done' : ''}"></div>
        <span class="task-title ${task.completed ? 'done' : ''}">${task.title}</span>
        ${!task.completed ? `<button class="btn" onclick="completeTask(${task.id})">Complete</button>` : ""}
        <button class="btn btn-danger" onclick="deleteTask(${task.id})">Delete</button>
      `;
      list.appendChild(item);
    });

    const remaining = tasks.filter(t => !t.completed).length;
    footer.textContent = `${remaining} task${remaining !== 1 ? "s" : ""} remaining`;
  }

  async function addTask() {
    const input = document.getElementById("new-task");
    const title = input.value.trim();
    if (!title) return;
    await fetch(`${API}/tasks`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ title })
    });
    input.value = "";
    loadTasks();
  }

  async function completeTask(id) {
    await fetch(`${API}/tasks/${id}/complete`, {
      method: "PATCH",
      headers: { "Authorization": `Bearer ${token}` }
    });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`${API}/tasks/${id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });
    loadTasks();
  }
</script>

</body>
</html>
